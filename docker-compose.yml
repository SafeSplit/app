name: safesplit-app

services:
    safesplit-app:
        build:
            context: .
            dockerfile: ./Dockerfile
            args:
                uid: 1000
                user: safesplit
        image: safesplit-app
        container_name: safesplit-app
        restart: unless-stopped
        command: ["sh", "./docker/start.sh"]
        environment:
            DB_HOST: safesplit-mariadb
            DB_PORT: 3306
            # Hardhat JSON-RPC reachable from inside the container (host-exposed port).
            SAFESPLIT_RPC_URL: http://host.docker.internal:49545
        extra_hosts:
            - "host.docker.internal:host-gateway"
        ports:
            - 49100:8000     # php artisan serve
            - 49105:49105    # Vite dev server
        volumes:
            - .:/var/www/html
            # Shared contract deployment file written by the blockchain brick (D7).
            - ../blockchain/deployments:/var/www/html/storage/app/blockchain
        depends_on:
            safesplit-mariadb:
                condition: service_healthy

    safesplit-mariadb:
        image: mariadb:11
        container_name: safesplit-mariadb
        restart: always
        environment:
            MARIADB_ROOT_PASSWORD: root
            MARIADB_DATABASE: safesplit
            MARIADB_USER: safesplit
            MARIADB_PASSWORD: safesplit
        ports:
            - 49110:3306
        volumes:
            - ./.configs/mariadb-data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            interval: 5s
            timeout: 5s
            retries: 20

    safesplit-phpmyadmin:
        image: phpmyadmin:latest
        container_name: safesplit-phpmyadmin
        restart: always
        environment:
            PMA_HOST: safesplit-mariadb
            PMA_USER: root
            PMA_PASSWORD: root
            UPLOAD_LIMIT: 512M
        ports:
            - 49120:80
        depends_on:
            - safesplit-mariadb
